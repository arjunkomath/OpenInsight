name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            binary: openinsight
            archive: openinsight-linux-x64.tar.gz
          - os: ubuntu-24.04-arm
            target: linux-arm64
            binary: openinsight
            archive: openinsight-linux-arm64.tar.gz
          - os: macos-14
            target: darwin-arm64
            binary: openinsight
            archive: openinsight-darwin-arm64.tar.gz

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set app version from tag
        shell: bash
        run: |
          bun --eval '
            const {writeFileSync} = require("node:fs");
            const tag = process.env.GITHUB_REF_NAME;
            if (!tag?.startsWith("v") || tag.length === 1) {
              throw new Error(`Expected a version tag like v0.9.0, got ${tag}`);
            }

            const version = tag.slice(1);
            writeFileSync(
              "source/utils/version.js",
              `export const APP_VERSION = ${JSON.stringify(version)};\n`,
            );
            console.log(`APP_VERSION=${version}`);
          '

      - name: Compile binary
        shell: bash
        run: |
          mkdir -p dist/package
          bun build source/cli.js \
            --compile \
            --target=bun-${{ matrix.target }} \
            --minify \
            --outfile dist/package/${{ matrix.binary }}

          chmod +x dist/package/${{ matrix.binary }}

      - name: Smoke test binary
        shell: bash
        run: ./dist/package/${{ matrix.binary }} --help

      - name: Smoke test web mode
        shell: bash
        run: |
          ./dist/package/${{ matrix.binary }} --web --port 5679 > web-smoke.log 2>&1 &
          pid=$!
          trap 'kill $pid 2>/dev/null || true' EXIT

          for attempt in {1..50}; do
            if curl -fsS http://127.0.0.1:5679/api/status >/tmp/openinsight-status.json; then
              break
            fi
            sleep 0.1
          done

          curl -fsS http://127.0.0.1:5679/ >/tmp/openinsight-index.html
          curl -fsS http://127.0.0.1:5679/app.js >/tmp/openinsight-app.js
          curl -fsS http://127.0.0.1:5679/styles.css >/tmp/openinsight-styles.css
          grep -q "OpenInsight" /tmp/openinsight-app.js
          grep -q "prefers-color-scheme" /tmp/openinsight-styles.css

      - name: Package binary
        shell: bash
        run: |
          tar -C dist/package -czf dist/${{ matrix.archive }} ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/openinsight-*.tar.gz

  homebrew:
    name: Publish Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Publish Homebrew formula
        run: bun script/publish-homebrew.js
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            binary: openinsight
            archive: openinsight-linux-x64.tar.gz
          - os: ubuntu-24.04-arm
            target: linux-arm64
            binary: openinsight
            archive: openinsight-linux-arm64.tar.gz
          - os: macos-13
            target: darwin-x64
            binary: openinsight
            archive: openinsight-darwin-x64.tar.gz
          - os: macos-14
            target: darwin-arm64
            binary: openinsight
            archive: openinsight-darwin-arm64.tar.gz
          - os: windows-latest
            target: windows-x64
            binary: openinsight.exe
            archive: openinsight-windows-x64.tar.gz

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Compile binary
        shell: bash
        run: |
          mkdir -p dist/package
          bun build source/cli.js \
            --compile \
            --target=bun-${{ matrix.target }} \
            --minify \
            --outfile dist/package/${{ matrix.binary }}

          if [[ "${{ matrix.target }}" != windows-* ]]; then
            chmod +x dist/package/${{ matrix.binary }}
          fi

      - name: Smoke test binary
        shell: bash
        run: ./dist/package/${{ matrix.binary }} --help

      - name: Package binary
        shell: bash
        run: |
          tar -C dist/package -czf dist/${{ matrix.archive }} ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/openinsight-*.tar.gz

  homebrew:
    name: Publish Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish Homebrew formula
        run: bun script/publish-homebrew.js
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
